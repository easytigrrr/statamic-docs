{{ partial:header }}

{{ content }}
<table>
    <thead>
        <tr>
            <th>Type</th>
            <th>Description</th>
        </tr>
    </thead>
    {{ collection:tags }}

        <td>
            <a href="{{ url }}">{{ title }}</a>
        </td>
        <td>
            {{ description | markdown ?? intro | markdown }}
        </td>
    </tr>
    {{ /collection:tags }}
</table>

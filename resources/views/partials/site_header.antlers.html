<a href="#main" class="c-skip-to-content u-screen-reader-text" title="Skip to content">
    Skip to content
</a>

<a href="#footer" class="c-skip-to-content u-screen-reader-text" title="Skip to footer navigation">
    Skip to footer navigation
</a>

<header class="c-docs-header">
    <div class="c-docs-header__inner">
        <a class="o-logo" href="/">
            {{ svg src='logomark' }}
            {{ svg src='wordmark' }}
        </a>
        <div class="c-docs-header__search">
            <button 
                class="c-nav-collapse-expand js__expand-collapse-nav u-hide-on-small-screens"
                x-data="{
                    isCollapsed: $persist(false).as('nav-is-collapsed'),
                    init() {
                        // Sync with nav container's persisted state on init
                        // The persisted value should already be loaded, but we'll also listen for updates
                        // Request the current state to ensure sync
                        setTimeout(() => {
                            window.dispatchEvent(new CustomEvent('request-nav-state'));
                        }, 50);
                        
                        // Listen for state changes from nav container
                        window.addEventListener('nav-collapse-changed', (e) => {
                            // Update both the local state and ensure it persists
                            this.isCollapsed = e.detail.isCollapsed;
                        });
                    },
                    toggleNav() {
                        // Dispatch event that nav container will listen to
                        window.dispatchEvent(new CustomEvent('toggle-nav-collapse'));
                    }
                }"
                @click="toggleNav()"
                :class="{ 'js__expand-collapse-nav--collapsed': isCollapsed }"
            >
                {{ svg src='nav-collapsed' }}
            </button>
            <form class="c-search-form" action="/search-results">
                <div id="docsearch" ref="docSearch"></div>
            </form>
            <div class="c-theme-picker">
                <div class="c-theme-picker__button">
                    <img class="c-theme-picker-light-icon u-hide-in-dark-mode" src="/img/theme-light.svg" alt="Light theme" />
                    <img class="c-theme-picker-dark-icon u-hide-in-light-mode" src="/img/theme-dark.svg" alt="Dark theme" />
                </div>
                <select id="color-scheme">
                    <option value="system">System</option>
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>
        </div>
        <div class="c-version-selector">
            <select
                x-data="{
                    selectedVersion: '{{ config:docs:version }}',
                    init() {
                        this.$watch('selectedVersion', (version) => {
                            const selectedOption = document.querySelector(`option[value='${version}']`);
                            const url = selectedOption.getAttribute('data-url');

                            window.location = `${url}/from/{{ page:id }}`;
                        });
                    },
                }"
                x-model="selectedVersion"
            >
                {{ config:docs:versions }}
                    <option value="{{ version }}" data-url="{{ url }}">
                        v&hairsp;{{ branch }}{{ if alpha }}-alpha{{ /if }}
                    </option>
                {{ /config:docs:versions }}
            </select>
        </div>
    </div>
</header>
